name: Build and deploy to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Drizzle migrations
        run: npx drizzle-kit generate

      - name: Build application
        run: npm run build

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp -r dist deploy/dist
          cp package.json deploy/package.json
          cp package-lock.json deploy/package-lock.json
          cp vercel.json deploy/vercel.json 2>/dev/null || true
          tar -czf deploy.tar.gz -C deploy .

      - name: Upload build to VPS
        uses: appleboy/scp-action@v0.1.6
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: deploy.tar.gz
          target: ${{ secrets.VPS_DEPLOY_PATH }}
          overwrite: true

      - name: Extract and restart app on VPS
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            mkdir -p "${{ secrets.VPS_DEPLOY_PATH }}"
            tar -xzf "${{ secrets.VPS_DEPLOY_PATH }}/deploy.tar.gz" -C "${{ secrets.VPS_DEPLOY_PATH }}"
            rm -f "${{ secrets.VPS_DEPLOY_PATH }}/deploy.tar.gz"
            cd "${{ secrets.VPS_DEPLOY_PATH }}"

            if [ -f package.json ]; then
              npm ci --omit=dev --ignore-scripts || true
            fi

            if [ -f .env.production ]; then
              cp .env.production .env || true
            fi

            if [ -f package.json ]; then
              npx drizzle-kit migrate || true
            fi

            if command -v pm2 >/dev/null 2>&1; then
              pm2 restart jollyhqserver || pm2 start dist/server.js --name jollyhqserver
            elif command -v systemctl >/dev/null 2>&1; then
              sudo systemctl restart jollyhqserver || true
            fi
